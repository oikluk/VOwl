name: VOWL Auto Update

on:
  schedule:
    - cron: '0 */4 * * *' # Запуск каждые 4 часа
  workflow_dispatch:      # Кнопка для ручного запуска в меню Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Разрешение на запись файлов в репозиторий

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run VOWL Processor
        run: python vowl_processor.py

      - name: Push Changes to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавляем все три файла
          git add nonobr.txt nonname.txt gotov.txt
          
          # Проверяем, есть ли изменения, чтобы не плодить пустые коммиты
          if git diff --staged --quiet; then
            echo "Изменений не обнаружено. Пропускаю коммит."
          else
            git commit -m "Update VOWL: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
